version: '3.8'

services:
  evilginx:
    build: 
      context: ./docker/evilginx/
      dockerfile: Dockerfile
    container_name: evilginx_server
    restart: always
    tty: true          # <--- Dodane: symuluje terminal
    stdin_open: true   # <--- Dodane: trzyma otwarte wejście
    network_mode: "host"
    volumes:
      - evilginx_data:/root/.evilginx
      - ./phishlets:/app/phishlets

volumes:
  evilginx_data:
    name: evilginx_persistent_data
