---
- name: Base VPS Configuration and Firewall Setup
  hosts: evilginx_server
  become: yes

  tasks:
    - name: Update APT package cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install required programs
      apt:
        name:
          - ipset
          - iptables-persistent
          - curl
        state: present

    - name: Create directory for firewall scripts
      file:
        path: "{{ ansible_env.HOME }}/firewall_scripts"
        state: directory
        mode: '0755'

    - name: Deploy GeoIP update script
      copy:
        src: files/update_ips.sh
        dest: "{{ ansible_env.HOME }}/firewall_scripts/update_ips.sh"
        mode: '0755'

    - name: Deploy port opening script (80/443)
      copy:
        src: files/open_ports.sh
        dest: "{{ ansible_env.HOME }}/firewall_scripts/open_ports.sh"
        mode: '0755'

    - name: Deploy port closing script (80/443)
      copy:
        src: files/close_ports.sh
        dest: "{{ ansible_env.HOME }}/firewall_scripts/close_ports.sh"
        mode: '0755'

    - name: Initialize GeoIP database
      command: "{{ ansible_env.HOME }}/firewall_scripts/update_ips.sh"
      register: ipset_result
      changed_when: "'FINISHED' in ipset_result.stdout"

    - name: Configure iptables - Allow loopback (localhost)
      iptables:
        chain: INPUT
        in_interface: lo
        jump: ACCEPT

    - name: Configure iptables - Allow established connections
      iptables:
        chain: INPUT
        ctstate: ESTABLISHED,RELATED
        jump: ACCEPT

    - name: Configure iptables - Allow SSH traffic
      iptables:
        chain: INPUT
        protocol: tcp
        destination_port: '22'
        jump: ACCEPT

    - name: Configure iptables - Allow traffic from GeoIP set
      iptables:
        chain: INPUT
        match: set
        match_set: country_ips
        match_set_flags: src
        jump: ACCEPT

    - name: Configure iptables - Set default DROP rules
      iptables:
        chain: INPUT
        policy: DROP

    - name: Save iptables rules
      command: netfilter-persistent save

    - name: Disable DNSStubListener (free port 53)
      lineinfile:
        path: /etc/systemd/resolved.conf
        regexp: '^#?DNSStubListener='
        line: 'DNSStubListener=no'

    - name: Recreate resolv.conf symlink
      file:
        src: /run/systemd/resolve/resolv.conf
        dest: /etc/resolv.conf
        state: link
        force: yes
      notify: Restart systemd-resolved

  handlers:
    - name: Restart systemd-resolved
      systemd:
        name: systemd-resolved
        state: restarted
