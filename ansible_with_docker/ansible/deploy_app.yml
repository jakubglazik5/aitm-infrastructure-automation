---
  - name: Deploy Docker and Evilginx App
    hosts: evilginx_server
    become: yes

    tasks:
      - name: Disable systemd-resolved (required to use port 53)
        systemd:
          name: systemd-resolved
          state: stopped
          enabled: no

      - name: Remove existing resolv.conf symlink
        file:
          path: /etc/resolv.conf
          state: absent

      - name: Configure Google Public DNS (replaces removed systemd-resolved)
        copy:
          dest: /etc/resolv.conf
          content: "nameserver 8.8.8.8\n"
          mode: '0644'

      - name: Download Docker setup script
        get_url:
          url: https://get.docker.com
          dest: /tmp/get-docker.sh
          mode: '0755'

      - name: Install Docker Engine
        command: /tmp/get-docker.sh
        args:
          creates: /usr/bin/docker

      - name: Install Docker Compose plugin
        apt:
          name: docker-compose-plugin
          state: present
          update_cache: yes

      - name: Create Evilginx directory structure
        file:
          path: /opt/evilginx/docker/evilginx
          state: directory
          mode: '0755'

      - name: Deploy docker-compose.yml
        copy:
          src: ../docker-compose.yml
          dest: /opt/evilginx/docker-compose.yml

      - name: Deploy Dockerfile
        copy:
          src: ../docker/evilginx/Dockerfile
          dest: /opt/evilginx/docker/evilginx/Dockerfile

      - name: Create phishlets directory
        file:
          path: /opt/evilginx/phishlets
          state: directory
          mode: '0755'

      - name: Download example phishlet from repository
        get_url:
          url: https://raw.githubusercontent.com/kgretzky/evilginx2/master/phishlets/example.yaml
          dest: /opt/evilginx/phishlets/example.yaml
          mode: '0644'

      - name: Install ipset for firewall configuration
        apt:
          name: ipset
          state: present
          update_cache: yes

      - name: Create firewall scripts directory
        file:
          path: /root/firewall_scripts
          state: directory
          mode: '0755'

      - name: Deploy firewall scripts
        copy:
          src: files/
          dest: /root/firewall_scripts/
          mode: '0755'

      - name: Build image and start Docker container
        command: docker compose up -d --build
        args:
          chdir: /opt/evilginx
