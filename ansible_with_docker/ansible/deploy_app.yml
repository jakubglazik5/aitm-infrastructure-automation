---
- name: Wdrożenie Dockera i aplikacji Evilginx
  hosts: evilginx_server
  become: yes

  tasks:
    - name: Pobranie oficjalnego skryptu instalacyjnego Dockera
      get_url:
        url: https://get.docker.com
        dest: /tmp/get-docker.sh
        mode: '0755'

    - name: Instalacja silnika Dockera
      command: /tmp/get-docker.sh
      args:
        creates: /usr/bin/docker # Zapewnia idempotencję (nie uruchomi się, jeśli Docker już jest)

    - name: Instalacja wtyczki Docker Compose
      apt:
        name: docker-compose-plugin
        state: present
        update_cache: yes

    - name: Utworzenie struktury katalogów pod aplikację (/opt/evilginx)
      file:
        path: /opt/evilginx/docker/evilginx
        state: directory
        mode: '0755'

    - name: Wgranie pliku konfiguracyjnego docker-compose.yml
      copy:
        src: ../docker-compose.yml
        dest: /opt/evilginx/docker-compose.yml

    - name: Wgranie instrukcji budowy Dockerfile
      copy:
        src: ../docker/evilginx/Dockerfile
        dest: /opt/evilginx/docker/evilginx/Dockerfile

    - name: Budowa obrazu i uruchomienie kontenera w tle
      command: docker compose up -d --build
      args:
        chdir: /opt/evilginx
